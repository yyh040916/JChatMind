server:
  port: 8090

spring:
  application:
    name: myjchatmind
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${DEEPSEEK_MODEL:deepseek-chat}

myjchatmind:
  default-system-prompt: "You are a concise and reliable Chinese AI assistant."
